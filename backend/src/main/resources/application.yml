spring:
  application:
    name: terrace-villa-backend
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

server:
  port: 8080

# CORS configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - https://your-production-domain.com

# Media configuration
media:
  # Local storage path (dev mode)
  local-path: ${user.dir}/../data/local-media
  # S3 configuration (production)
  s3:
    bucket-name: ${AWS_S3_BUCKET:terrace-villa-foresta-asama-prod}
    region: ${AWS_REGION:ap-northeast-1}
    presigned-url-expiry: 3600  # seconds

# Content configuration
content:
  yaml-path: ${user.dir}/../data/content

logging:
  level:
    jp.forestaasama: DEBUG
    org.springframework.web: INFO
