spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:forestadb}?useUnicode=true&characterEncoding=utf8&useSSL=true&requireSSL=false
    username: ${DB_USER}
    password: ${DB_PASSWORD}
